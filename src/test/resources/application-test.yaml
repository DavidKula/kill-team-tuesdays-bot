spring:
  application:
    name: kill-team-discord-bot
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  docker:
    compose:
      lifecycle-management: start_only
      enabled: false
  datasource:
    url: jdbc:tc:postgresql:14.8-alpine3.18://test

discord:
  bot:
    token: dummy
  channel:
    id: dummy
  oauth:
    url: dummy

pairing:
  strategy: least-played

poll:
  cron: "0 * * * * *"
  question: "Are you coming to play Kill Team this week on tuesday at 17:30?"
  duration: 1m
